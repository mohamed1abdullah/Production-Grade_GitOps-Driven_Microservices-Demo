apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: boutique-image-updater
  namespace: argocd
spec:
  namespace: argocd
  applicationRefs:
    - namePattern: "boutique-*"

      commonUpdateSettings:
        updateStrategy: "newest-build"
        allowTags: "regexp:^sha-[a-f0-9]{7,40}$"

      images:
        - alias: adservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/adservice

        - alias: cartservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/cartservice

        - alias: checkoutservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/checkoutservice

        - alias: currencyservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/currencyservice

        - alias: emailservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/emailservice

        - alias: frontend
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/frontend

        - alias: paymentservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/paymentservice

        - alias: productcatalogservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/productcatalogservice

        - alias: recommendationservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/recommendationservice

        - alias: shippingservice
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/shippingservice

        - alias: loadgenerator
          imageName: ghcr.io/mohamed1abdullah/microservices-demo/loadgenerator

