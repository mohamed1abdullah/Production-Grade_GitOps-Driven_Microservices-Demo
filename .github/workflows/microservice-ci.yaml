name: Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}

    steps:
      # -------------------
      # Checkout source
      # -------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------
      # Docker Buildx (cache support)
      # -------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------
      # Login to GHCR
      # -------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------
      # Build Docker image (cached)
      # -------------------
      - name: Build Image
        run: |
              SERVICE="./src/${{ inputs.service }}"

              if [ -f "$SERVICE/Dockerfile" ]; then
                DOCKERFILE="$SERVICE/Dockerfile"
                CONTEXT="$SERVICE"
              elif [ -f "$SERVICE/src/Dockerfile" ]; then
                DOCKERFILE="$SERVICE/src/Dockerfile"
                CONTEXT="$SERVICE/src"
              else
                echo "Dockerfile not found for ${{ inputs.service }}"
                exit 1
              fi

                echo "Using Dockerfile: $DOCKERFILE"
                echo "Build context: $CONTEXT"

              docker build \
                --cache-from=type=gha \
                --cache-to=type=gha,mode=max \
                -t "$IMAGE_NAME" \
                -f "$DOCKERFILE" \
                "$CONTEXT"

      # -------------------
      # Security Scan (before push)
      # -------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          exit-code: 0
          vuln-type: os,library

      # -------------------
      # Push image (only if scan passes)
      # -------------------
      - name: Push Image
        run: |
          docker push $IMAGE_NAME
